<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F8F9FA;padding:24px}
.title{font-size:11px;font-weight:600;color:#8A9BA8;letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.badge{display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid}
.swatch-row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.swatch{border-radius:8px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
.color{height:36px}
.label{background:#fff;padding:4px 6px;font-size:9px;font-weight:600;text-align:center}
</style></head><body>
<div class="title">Destination Category Badges</div>
<div class="badges">
  <span class="badge" style="background:#e3f2fd;color:#0277bd;border-color:#90caf9">Playa</span>
  <span class="badge" style="background:#fff3e0;color:#ef6c00;border-color:#ffcc02">Histórico</span>
  <span class="badge" style="background:#e8f5e8;color:#2e7d32;border-color:#a5d6a7">Natural</span>
  <span class="badge" style="background:#fce4ec;color:#c2185b;border-color:#f8bbd9">Aventura</span>
  <span class="badge" style="background:#f3e5f5;color:#7b1fa2;border-color:#ce93d8">Cultural</span>
  <span class="badge" style="background:#e0f7fa;color:#00838f;border-color:#80deea">Paradisíaco</span>
  <span class="badge" style="background:#eceff1;color:#546e7a;border-color:#b0bec5">Ingeniería</span>
</div>
<div class="swatch-row">
  <div class="swatch"><div class="color" style="background:#e3f2fd"></div><div class="label" style="color:#0277bd">Playa</div></div>
  <div class="swatch"><div class="color" style="background:#fff3e0"></div><div class="label" style="color:#ef6c00">Histórico</div></div>
  <div class="swatch"><div class="color" style="background:#e8f5e8"></div><div class="label" style="color:#2e7d32">Natural</div></div>
  <div class="swatch"><div class="color" style="background:#fce4ec"></div><div class="label" style="color:#c2185b">Aventura</div></div>
  <div class="swatch"><div class="color" style="background:#f3e5f5"></div><div class="label" style="color:#7b1fa2">Cultural</div></div>
  <div class="swatch"><div class="color" style="background:#e0f7fa"></div><div class="label" style="color:#00838f">Paradisíaco</div></div>
  <div class="swatch"><div class="color" style="background:#eceff1"></div><div class="label" style="color:#546e7a">Ingeniería</div></div>
</div>
</body></html>
