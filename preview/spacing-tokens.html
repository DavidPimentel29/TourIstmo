<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F8F9FA;padding:20px}
.section{margin-bottom:20px}
.section-label{font-size:10px;font-weight:600;color:#8A9BA8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.bar-wrap{flex:1;background:#fff;border-radius:6px;border:1px solid #E1E8ED;padding:4px}
.bar{height:20px;border-radius:4px;background:linear-gradient(135deg,#588684,#8BAD65)}
.meta{display:flex;gap:8px;min-width:140px}
.token{font-size:10px;font-family:monospace;color:#D57133;font-weight:600;min-width:80px}
.size{font-size:10px;color:#5A6B7D}
</style></head><body>
<div class="section-label">Spacing Scale (8pt base)</div>
<div class="section">
  <div class="row"><div class="meta"><div class="token">--spacing-xs</div><div class="size">4px</div></div><div class="bar-wrap"><div class="bar" style="width:4px"></div></div></div>
  <div class="row"><div class="meta"><div class="token">--spacing-sm</div><div class="size">8px</div></div><div class="bar-wrap"><div class="bar" style="width:8px"></div></div></div>
  <div class="row"><div class="meta"><div class="token">--spacing-md</div><div class="size">16px</div></div><div class="bar-wrap"><div class="bar" style="width:16px"></div></div></div>
  <div class="row"><div class="meta"><div class="token">--spacing-lg</div><div class="size">24px</div></div><div class="bar-wrap"><div class="bar" style="width:24px"></div></div></div>
  <div class="row"><div class="meta"><div class="token">--spacing-xl</div><div class="size">32px</div></div><div class="bar-wrap"><div class="bar" style="width:32px"></div></div></div>
  <div class="row"><div class="meta"><div class="token">--spacing-2xl</div><div class="size">48px</div></div><div class="bar-wrap"><div class="bar" style="width:48px"></div></div></div>
  <div class="row"><div class="meta"><div class="token">--spacing-3xl</div><div class="size">64px</div></div><div class="bar-wrap"><div class="bar" style="width:64px"></div></div></div>
</div>
</body></html>
