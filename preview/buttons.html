<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F8F9FA;padding:20px;display:flex;flex-direction:column;gap:16px}
.label{font-size:10px;font-weight:600;color:#8A9BA8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter';font-weight:600;cursor:pointer;border:none;transition:all .2s ease;white-space:nowrap}
.btn-primary{background:#D57133;color:#fff;padding:12px 32px;border-radius:50px;font-size:15px;box-shadow:0 4px 12px rgba(40,57,81,.12)}
.btn-secondary{background:#588684;color:#fff;padding:8px 20px;border-radius:50px;font-size:14px}
.btn-outline{background:transparent;color:#588684;border:2px solid #588684;padding:7px 20px;border-radius:50px;font-size:14px}
.btn-danger{background:#E74C3C;color:#fff;padding:8px 20px;border-radius:50px;font-size:14px}
.btn-nav{background:#D57133;color:#fff;padding:6px 16px;border-radius:50px;font-size:13px}
.btn-sm{padding:4px 14px;font-size:13px;border-radius:50px;background:#D57133;color:#fff;border:none;font-family:'Inter';font-weight:600}
.btn-lg{padding:16px 40px;font-size:17px;border-radius:50px;background:#D57133;color:#fff;border:none;font-family:'Inter';font-weight:600}
.disabled{opacity:.5;cursor:not-allowed}
</style></head><body>
<div>
  <div class="label">Primary Buttons</div>
  <div class="row">
    <button class="btn btn-primary">Ver todos los destinos</button>
    <button class="btn btn-primary btn-sm">Pequeño</button>
    <button class="btn btn-primary btn-lg">Grande</button>
    <button class="btn btn-primary disabled" disabled>Deshabilitado</button>
  </div>
</div>
<div>
  <div class="label">Secondary & Outline</div>
  <div class="row">
    <button class="btn btn-secondary">Explorar Planes</button>
    <button class="btn btn-outline">Ver Detalles</button>
    <button class="btn btn-nav">Ingresar</button>
  </div>
</div>
<div>
  <div class="label">State Buttons</div>
  <div class="row">
    <button class="btn btn-danger">Rechazar</button>
    <button class="btn btn-secondary">Aprobar</button>
    <button class="btn btn-outline" style="color:#D57133;border-color:#D57133">Registra un destino</button>
  </div>
</div>
</body></html>
